global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "inference-service"
    static_configs:
      - targets: ["inference:8000"]
    metrics_path: /metrics

  - job_name: "drift-monitor"
    static_configs:
      - targets: ["drift-monitor:8001"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
